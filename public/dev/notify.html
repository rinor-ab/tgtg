<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev: Test Notification</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; margin: 0; background: #F5F3EE; color: #111; }
  button { font-size: 18px; padding: 16px 32px; border: none; border-radius: 12px; background: #5BAD92; color: #fff; font-weight: 700; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  #countdown { font-size: 72px; font-weight: 900; margin: 24px 0; min-height: 90px; color: #1A3C34; }
  #status { font-size: 14px; color: #888; margin-top: 16px; text-align: center; max-width: 300px; }
</style>
</head>
<body>
  <button id="btn" onclick="start()">Send Test Notification</button>
  <div id="countdown"></div>
  <div id="status"></div>

<script>
const btn = document.getElementById('btn');
const countdownEl = document.getElementById('countdown');
const statusEl = document.getElementById('status');

function log(msg) { statusEl.textContent = msg; }

async function start() {
  btn.disabled = true;

  // 1. Request notification permission
  if (Notification.permission === 'default') {
    log('Requesting notification permission...');
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      log('Permission denied. Enable notifications in Settings > Safari > Notifications.');
      btn.disabled = false;
      return;
    }
  } else if (Notification.permission === 'denied') {
    log('Notifications blocked. Enable in Settings > Safari > Notifications.');
    btn.disabled = false;
    return;
  }

  // 2. Register service worker
  log('Registering service worker...');
  let reg;
  try {
    reg = await navigator.serviceWorker.register('/sw.js');
    // Wait for it to be active
    if (!reg.active) {
      await new Promise((resolve) => {
        const sw = reg.installing || reg.waiting;
        if (!sw) { resolve(); return; }
        sw.addEventListener('statechange', () => { if (sw.state === 'activated') resolve(); });
      });
    }
  } catch (e) {
    log('Service worker error: ' + e.message);
    btn.disabled = false;
    return;
  }

  log('Starting countdown...');

  // 3. Countdown
  let secs = 10;
  countdownEl.textContent = secs;
  const interval = setInterval(() => {
    secs--;
    countdownEl.textContent = secs > 0 ? secs : '';
    if (secs <= 0) {
      clearInterval(interval);
      sendNotification(reg);
    }
  }, 1000);
}

function sendNotification(reg) {
  log('Sending notification...');
  reg.active.postMessage({
    type: 'SHOW_NOTIFICATION',
    title: 'Too Good To Go',
    body: 'Your favorite bakery just dropped 3 bags — \ud83d\udccd 200m away',
    icon: '/icons/icon-192.png',
  });
  log('Notification sent! Lock your phone now.');
  btn.disabled = false;
  countdownEl.textContent = '';
}
</script>
</body>
</html>
